name: publish-h200-image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      base_image:
        description: Base verl/vLLM image used by docker/Dockerfile.h200
        required: false
        default: verlai/verl:vllm017.latest
        type: string
      custom_tag:
        description: Optional suffix published as h200-<custom_tag>
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: qingtianrobot/verl

jobs:
  build-and-push:
    name: Build and publish H200 image
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=h200-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=h200-
            type=ref,event=tag,prefix=h200-
            type=sha,format=short,prefix=h200-sha-
            type=raw,value=h200-${{ inputs.custom_tag }},enable=${{ inputs.custom_tag != '' }}

      - name: Build and push H200 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.h200
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERL_BASE_IMAGE=${{ inputs.base_image || 'verlai/verl:vllm017.latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Write job summary
        run: |
          {
            echo "### H200 image published"
            echo
            echo "Registry: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/' | sed 's/$/`/'
          } >> "${GITHUB_STEP_SUMMARY}"
